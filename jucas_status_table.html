<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IQAC CAS Status Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 20px;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
  font-size: 14px;
}

th {
  background: #1f3c88;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

.status {
  padding: 5px 10px;
  border-radius: 15px;
  color: white;
  font-size: 12px;
}
.status-badge {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.2s ease;
}

/* 🔵 Sent to Registrar */
.status-sent {
  background: #e3f2fd;
  color: #0d47a1;
  border: 1px solid #90caf9;
}

/* 🟢 Portal Opened */
.status-portal-open {
  background: #e8f5e9;
  color: #1b5e20;
  border: 1px solid #81c784;
}

/* 🔴 Portal Closed */
.status-portal-closed {
  background: #ffebee;
  color: #b71c1c;
  border: 1px solid #ef9a9a;
}

/* 🟣 Scrutinized */
.status-scrutinized {
  background: #f3e5f5;
  color: #6a1b9a;
  border: 1px solid #ce93d8;
}

/* 🟠 Ongoing */
.status-ongoing {
  background: #fff3e0;
  color: #e65100;
  border: 1px solid #ffb74d;
}

/* Default fallback */
.status-default {
  background: #eceff1;
  color: #37474f;
  border: 1px solid #cfd8dc;
}

/* subtle hover effect */
.status-badge:hover {
  transform: scale(1.05);
}  

.ongoing { background: #f39c12; }
.processed { background: #27ae60; }
.portal { background: #2980b9; }

.footer {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 5px;
  font-weight: bold;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>CAS Application Status – IQAC</h2>

<div class="stats">
  <div>Total Applications: <span id="totalCount">0</span></div>
  <div>Ongoing: <span id="ongoingCount">0</span></div>
  <div>Scrutinized: <span id="scrutinizedCount">0</span></div>
  <div>Sent to Registrar: <span id="sentCount">0</span></div>
</div>

<table id="sheetTable">
  <thead>
    <tr>
      <th>Sl No</th>
      <th>Date Received</th>
      <th>Name</th>
      <th>Department</th>
      <th>Status</th>
      <th>Date of Update</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="footer">
  Last Auto Updated: <span id="lastUpdated"></span>
</div>



<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzcb3SnesxhcJmVt82IS6yiBxt_JFfAc5Sx0_p1pqcyAbyq2xXspEapU5kqDCe1BTWNWQ/exec";

/* ---------- STATUS FORMATTER ---------- */

function formatStatus(status) {

  if (!status) return "-";

  const text = status.trim();

  switch (text) {

    case "Scrutinized & Sent to Registrar":
      return `<span class="status-badge status-sent">${text}</span>`;

    case "Scrutinized (Portal Opened)":
      return `<span class="status-badge status-portal-open">${text}</span>`;

    case "Scrutinized (Portal Closed)":
      return `<span class="status-badge status-portal-closed">${text}</span>`;

    case "Scrutinized":
      return `<span class="status-badge status-scrutinized">${text}</span>`;

    case "Ongoing":
      return `<span class="status-badge status-ongoing">${text}</span>`;

    default:
      return `<span class="status-badge status-default">${text}</span>`;
  }
}

/* ---------- LOAD DATA ---------- */

function loadData() {

  fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {

      const tbody = document.querySelector("#sheetTable tbody");
      tbody.innerHTML = "";

      // Declare counters once
      let total = 0;
      let ongoing = 0;
      let scrutinizedGroup = 0;
      let sentToRegistrar = 0;

      // Single loop only
      data.forEach(item => {

        total++;

        const statusText = (item.status || "").trim();

        switch (statusText) {

          case "Ongoing":
            ongoing++;
            break;

          case "Scrutinized":
          case "Scrutinized (Portal Opened)":
          case "Scrutinized (Portal Closed)":
            scrutinizedGroup++;
            break;

          case "Scrutinized & Sent to Registrar":
            sentToRegistrar++;
            break;
        }

        let tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${item.sl || ""}</td>
          <td>${item.dateReceived || ""}</td>
          <td>${item.name || ""}</td>
          <td>${item.department || ""}</td>
          <td>${formatStatus(item.status)}</td>
          <td>${item.updateDate || "-"}</td>
        `;

        tbody.appendChild(tr);

      });

      // Update counters AFTER loop
      document.getElementById("totalCount").textContent = total;
      document.getElementById("ongoingCount").textContent = ongoing;
      document.getElementById("scrutinizedCount").textContent = scrutinizedGroup;
      document.getElementById("sentCount").textContent = sentToRegistrar;

      document.getElementById("lastUpdated").textContent =
        new Date().toLocaleString();

    })
    .catch(error => {
      console.error("Error loading data:", error);
    });
}

loadData();

// Auto refresh every 20 seconds
setInterval(loadData, 20000);

</script>

</body>
</html>
