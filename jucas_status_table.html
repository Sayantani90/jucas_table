<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IQAC CAS Status Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 20px;
}

h2 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
  font-size: 14px;
}

th {
  background: #1f3c88;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

.status {
  padding: 5px 10px;
  border-radius: 15px;
  color: white;
  font-size: 12px;
}

.ongoing { background: #f39c12; }
.processed { background: #27ae60; }
.portal { background: #2980b9; }

.footer {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 5px;
  font-weight: bold;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>CAS Application Status – IQAC</h2>

<div class="stats">
  <div>Total Applications: <span id="totalCount">0</span></div>
  <div>Ongoing: <span id="ongoingCount">0</span></div>
  <div>Processed: <span id="processedCount">0</span></div>
  <div>Portal Updated: <span id="portalCount">0</span></div>
</div>

<table id="sheetTable">
  <thead>
    <tr>
      <th>Sl No</th>
      <th>Date Received</th>
      <th>Name</th>
      <th>Department</th>
      <th>Document Type</th>
      <th>Received From</th>
      <th>Status</th>
      <th>Date of Update</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="footer">
  Last Auto Updated: <span id="lastUpdated"></span>
</div>



<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbztDvc57Bz9szVpPRZii23kPElkHxdte9y3RfkNbeRmmvsTf373ill8b7-iSooO9qdGpA/exec";

function loadData() {

  fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {

      const tbody = document.querySelector("#sheetTable tbody");
      tbody.innerHTML = "";

      let total = 0;
      let ongoing = 0;
      let processed = 0;
      let portal = 0;

      data.forEach(item => {

        total++;

        let tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${item.sl || ""}</td>
          <td>${item.dateReceived || ""}</td>
          <td>${item.name || ""}</td>
          <td>${item.department || ""}</td>
          <td>${item.documentType || ""}</td>
          <td>${item.receivedFrom || ""}</td>
          <td></td>
          <td>${item.updateDate ? item.updateDate : "-"}</td>
        `;

        // FIX 1: define status cell
        let statusCell = tr.children[6];

        let statusText = item.status ? item.status : "";

        let span = document.createElement("span");
        span.classList.add("status");

        if (statusText.trim() === "") {
          span.textContent = "Not Updated";
          span.style.background = "#7f8c8d";
        } else {
          span.textContent = statusText;

          let s = statusText.toLowerCase();

          if (s.includes("ongoing")) {
            span.classList.add("ongoing");
            ongoing++;
          }
          else if (s.includes("processed") || s.includes("scrutinized")) {
            span.classList.add("processed");
            processed++;
          }
          else if (s.includes("portal")) {
            span.classList.add("portal");
            portal++;
          }
        }

        statusCell.appendChild(span);

        // FIX 2: append row
        tbody.appendChild(tr);

      });

      document.getElementById("totalCount").textContent = total;
      document.getElementById("ongoingCount").textContent = ongoing;
      document.getElementById("processedCount").textContent = processed;
      document.getElementById("portalCount").textContent = portal;

      document.getElementById("lastUpdated").textContent =
        new Date().toLocaleString();

    })
    .catch(error => {
      console.error("Error loading data:", error);
    });
}

loadData();

// Auto refresh every 60 seconds
setInterval(loadData, 60000);

</script>

</body>
</html>
